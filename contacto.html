<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Super Copy</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
        <h1>Super Copy</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>¡Contáctanos!</h2>
            <p>Usa este formulario para cotizar tus impresiones o preguntar por existencias.</p>

            <form action="#" method="get" class="formulario-supercopy">
                
                <div class="campo">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required maxlength="50">
                </div>

                <div class="campo">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="campo">
                    <label for="pin">PIN de cliente (4 números):</label>
                    <input type="password" id="pin" name="pin" pattern="[0-9]{4}" placeholder="1234" title="Debe ser un PIN de 4 dígitos">
                </div>

                <div class="campo">
                    <p>¿Qué servicio necesitas?</p>
                    <input type="radio" id="impresion" name="servicio" value="impresion" checked>
                    <label for="impresion">Impresiones/Copias</label>
                    <input type="radio" id="articulo" name="servicio" value="articulo">
                    <label for="articulo">Compra de artículos</label>
                </div>

                <div class="campo">
                    <label for="prioridad">Urgencia de respuesta:</label>
                    <select id="prioridad" name="prioridad">
                        <option value="baja">Puedo esperar (Baja)</option>
                        <option value="media">Media</option>
                        <option value="alta">¡Es urgente! (Alta)</option>
                    </select>
                </div>

                <div class="campo">
                    <input type="checkbox" id="terminos" name="terminos" required>
                    <label for="terminos">Acepto los términos y condiciones de Super Copy</label>
                </div>

                <div class="campo">
                    <label for="mensaje">Detalles de tu pedido:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Dinos qué necesitas imprimir o qué producto buscas..."></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Super Copy - Eficiencia y Calidad.</p>
    </footer>

</body>
</html>
